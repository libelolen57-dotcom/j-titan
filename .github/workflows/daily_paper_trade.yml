name: Daily Paper Trade & Signal Screener

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 16:00 JST (UTC+9) Mon-Fri
  workflow_dispatch:          # 手動実行も可能（テスト用）

permissions:
  contents: write

jobs:
  paper-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy matplotlib pytz xlrd openpyxl

      - name: Run daily paper trade (auto mode)
        run: python j_titan_engine.py --mode auto

      - name: Run signal screener and save results
        run: |
          mkdir -p output
          DATE=$(TZ='Asia/Tokyo' date +'%Y-%m-%d')
          DOW=$(TZ='Asia/Tokyo' date +'%u')   # 1=月曜日
          # 月曜日のみユニバースキャッシュを再構築（時価総額フィルター更新）
          if [ "$DOW" = "1" ]; then
            echo "月曜日: ユニバースキャッシュ再構築"
            python screen_signals.py --fetch --rebuild-cache | tee output/latest_signals.txt
          else
            python screen_signals.py --fetch | tee output/latest_signals.txt
          fi
          cp output/latest_signals.txt "output/signals_${DATE}.txt"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json data/ output/ index.html
          if git diff --staged --quiet; then
            echo "変化なし — コミットをスキップします"
          else
            git commit -m "auto: daily trade & signals $(TZ='Asia/Tokyo' date +'%Y-%m-%d') [skip ci]"
            git push
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.request, urllib.parse
          from datetime import datetime
          import pytz

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not token or not chat_id:
              print("Telegram未設定、スキップ")
              exit(0)
          date_str = datetime.now(pytz.timezone("Asia/Tokyo")).strftime("%Y-%m-%d")
          signal_file = f"output/signals_{date_str}.txt"

          signals, market_status, buy_count = [], "", 0
          if os.path.exists(signal_file):
              text = open(signal_file).read()
              m = re.search(r'買い確定:\s*(\d+)', text)
              buy_count = int(m.group(1)) if m else 0
              m2 = re.search(r'地合い\S+', text)
              market_status = m2.group(0) if m2 else ""
              for line in text.splitlines():
                  m3 = re.match(r'^\s+(\d{4})\s+(\S+)\s+[¥￥]\s*([\d,]+)\s+([\d.]+)\s+([\d.]+)', line)
                  if m3:
                      signals.append(f"{m3.group(1)} {m3.group(2)} ¥{m3.group(3)} RSI:{m3.group(4)}")

          pf = json.load(open("portfolio.json"))
          cash = f'{pf["cash"]:,.0f}'
          pnl = pf.get("total_realized_pnl", 0)
          pnl_str = f'+{pnl:,.0f}' if pnl >= 0 else f'{pnl:,.0f}'
          pos_count = len(pf.get("positions", {}))

          if buy_count > 0:
              codes = "\n".join(signals[:5])
              msg = (f"[J-Titan] シグナル発生 {date_str}\n\n"
                     f"買いシグナル: {buy_count}銘柄\n{codes}\n{market_status}\n\n"
                     f"現金: {cash}円\n保有: {pos_count}件\n確定損益: {pnl_str}円")
          else:
              msg = (f"[J-Titan] 日次レポート {date_str}\n\n"
                     f"シグナルなし\n{market_status}\n\n"
                     f"現金: {cash}円\n保有: {pos_count}件\n確定損益: {pnl_str}円")

          import json as _json
          payload = _json.dumps({"chat_id": int(chat_id), "text": msg}).encode("utf-8")
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          urllib.request.urlopen(req)
          print("Telegram通知送信完了")
          PYEOF

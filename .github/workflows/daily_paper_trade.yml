name: Daily Paper Trade & Signal Screener

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 16:00 JST (UTC+9) Mon-Fri
  workflow_dispatch:          # 手動実行も可能（テスト用）

permissions:
  contents: write

jobs:
  paper-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy matplotlib pytz

      - name: Run daily paper trade (auto mode)
        run: python j_titan_engine.py --mode auto

      - name: Run signal screener and save results
        run: |
          mkdir -p output
          DATE=$(TZ='Asia/Tokyo' date +'%Y-%m-%d')
          python screen_signals.py --fetch | tee output/latest_signals.txt
          cp output/latest_signals.txt "output/signals_${DATE}.txt"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json data/ output/
          if git diff --staged --quiet; then
            echo "変化なし — コミットをスキップします"
          else
            git commit -m "auto: daily trade & signals $(TZ='Asia/Tokyo' date +'%Y-%m-%d') [skip ci]"
            git push
          fi

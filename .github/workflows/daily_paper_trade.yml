name: Daily Paper Trade & Signal Screener

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 16:00 JST (UTC+9) Mon-Fri
  workflow_dispatch:          # 手動実行も可能（テスト用）

permissions:
  contents: write

jobs:
  paper-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy matplotlib pytz xlrd openpyxl

      - name: Run daily paper trade (auto mode)
        run: python j_titan_engine.py --mode auto

      - name: Run signal screener and save results
        run: |
          mkdir -p output
          DATE=$(TZ='Asia/Tokyo' date +'%Y-%m-%d')
          DOW=$(TZ='Asia/Tokyo' date +'%u')   # 1=月曜日
          # 月曜日のみユニバースキャッシュを再構築（時価総額フィルター更新）
          if [ "$DOW" = "1" ]; then
            echo "月曜日: ユニバースキャッシュ再構築"
            python screen_signals.py --fetch --rebuild-cache | tee output/latest_signals.txt
          else
            python screen_signals.py --fetch | tee output/latest_signals.txt
          fi
          cp output/latest_signals.txt "output/signals_${DATE}.txt"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json data/ output/ index.html
          if git diff --staged --quiet; then
            echo "変化なし — コミットをスキップします"
          else
            git commit -m "auto: daily trade & signals $(TZ='Asia/Tokyo' date +'%Y-%m-%d') [skip ci]"
            git push
          fi

      - name: Send Telegram notification
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(TZ='Asia/Tokyo' date +'%Y-%m-%d')
          SIGNAL_FILE="output/signals_${DATE}.txt"

          # シグナル数を抽出
          BUY_COUNT=0
          if [ -f "$SIGNAL_FILE" ]; then
            BUY_COUNT=$(grep -c "買いシグナル確定" "$SIGNAL_FILE" 2>/dev/null || echo 0)
            # 実際のシグナル銘柄数を抽出
            SIGNAL_LINE=$(grep "買い確定:" "$SIGNAL_FILE" | grep -oP '買い確定: \K\d+' || echo "0")
            BUY_COUNT=${SIGNAL_LINE:-0}
          fi

          # ポートフォリオ情報
          CASH=$(python3 -c "import json; d=json.load(open('portfolio.json')); print(f'{d[\"cash\"]:,.0f}')" 2>/dev/null || echo "-")
          PNL=$(python3 -c "import json; d=json.load(open('portfolio.json')); p=d.get('total_realized_pnl',0); print(f'+{p:,.0f}' if p>=0 else f'{p:,.0f}')" 2>/dev/null || echo "-")
          POS_COUNT=$(python3 -c "import json; d=json.load(open('portfolio.json')); print(len(d.get('positions',{})))" 2>/dev/null || echo "-")

          # 地合い
          MARKET_STATUS=$(grep -oP '地合い\S+' "$SIGNAL_FILE" 2>/dev/null | head -1 || echo "")

          # Telegramメッセージ構築
          if [ "$BUY_COUNT" -gt 0 ] 2>/dev/null; then
            SIGNAL_DETAIL=$(grep -A1 "買いシグナル確定" "$SIGNAL_FILE" 2>/dev/null | tail -20 || echo "")
            CODES=$(grep -E "^\s+[0-9]{4}" "$SIGNAL_FILE" 2>/dev/null | awk '{print $1, $2}' | head -5 | tr '\n' '\n' || echo "")
            MSG="🟢 *J-Titan シグナル発生* ${DATE}

買いシグナル: ${BUY_COUNT}銘柄
${CODES}
${MARKET_STATUS}

💰 現金: ¥${CASH}
📊 保有: ${POS_COUNT}件
📈 確定損益: ¥${PNL}"
          else
            MSG="⬜ *J-Titan 日次レポート* ${DATE}

シグナルなし
${MARKET_STATUS}

💰 現金: ¥${CASH}
📊 保有: ${POS_COUNT}件
📈 確定損益: ¥${PNL}"
          fi

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=Markdown" \
            --data-urlencode "text=${MSG}" \
            > /dev/null
